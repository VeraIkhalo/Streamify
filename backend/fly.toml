# fly.toml app configuration generated for streamify-backend

app = "streamify-backend"
primary_region = "iad"

[build]
  builder = "heroku"

[env]
  PORT = "5001"

[[services]]
  internal_port = 5001
  processes = ["app"]
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.tcp_checks]]
    interval = "10s"
    timeout = "5s"
